[pytest]
# ---------------------------------------------------------------------------
# Pytest configuration
# ---------------------------------------------------------------------------

# Test discovery — look in root for test_main.py
testpaths = .

# Only pick up test_main.py
python_files = test_main.py

# Output options
addopts =
    -v
    --tb=short
    --no-header

# Suppress noisy PySpark internal warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning